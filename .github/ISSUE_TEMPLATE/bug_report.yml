name: Bug report
description: Report a reproducible problem.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Steps to reproduce the issue.
      placeholder: |
        1. Start the Worker with npm run dev
        2. Request ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: wrangler
    attributes:
      label: Wrangler version
      placeholder: "wrangler 4.87.0"
  - type: textarea
    id: logs
    attributes:
      label: Logs
      render: shell
