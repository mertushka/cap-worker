<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cap Worker Test</title>
    <script src="https://cdn.jsdelivr.net/npm/@cap.js/widget@0.1.26"></script>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f6f7f9;
        color: #16181d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
      }

      main {
        width: min(960px, calc(100% - 32px));
        margin: 0 auto;
        padding: 48px 0;
      }

      header {
        margin-bottom: 28px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 34px;
        line-height: 1.1;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        max-width: 680px;
        color: #5a6270;
        line-height: 1.6;
      }

      .panel {
        display: grid;
        gap: 24px;
        padding: 24px;
        border: 1px solid #dfe3ea;
        border-radius: 8px;
        background: #ffffff;
      }

      .widget-row {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 16px;
      }

      cap-widget {
        --cap-background: #ffffff;
        --cap-border-color: #cbd2dc;
        --cap-border-radius: 8px;
        --cap-color: #16181d;
        --cap-font:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --cap-spinner-color: #2b6cb0;
      }

      button {
        min-height: 40px;
        padding: 0 14px;
        border: 1px solid #b8c1ce;
        border-radius: 8px;
        background: #ffffff;
        color: #16181d;
        cursor: pointer;
        font: inherit;
      }

      button:hover {
        background: #f0f4f8;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      dl {
        display: grid;
        grid-template-columns: minmax(96px, max-content) 1fr;
        gap: 10px 16px;
        margin: 0;
      }

      dt {
        color: #5a6270;
        font-weight: 600;
      }

      dd {
        margin: 0;
        min-width: 0;
        overflow-wrap: anywhere;
      }

      code,
      pre {
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      }

      pre {
        min-height: 160px;
        max-height: 320px;
        margin: 0;
        overflow: auto;
        padding: 14px;
        border-radius: 8px;
        background: #111827;
        color: #e5e7eb;
        line-height: 1.5;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Cap Worker Test</h1>
        <p>
          This page loads the Cap widget from jsDelivr and points it at this Worker's same-origin
          challenge API. Solve the widget, then validate the returned token.
        </p>
      </header>

      <section class="panel" aria-label="Cap test panel">
        <div class="widget-row">
          <cap-widget
            id="cap"
            data-cap-api-endpoint="/"
            data-cap-worker-count="2"
            data-cap-i18n-initial-state="I'm a human"
            data-cap-i18n-verifying-label="Verifying..."
            data-cap-i18n-solved-label="Verified"
            data-cap-i18n-error-label="Try again"
          ></cap-widget>

          <button id="validate" type="button" disabled>Validate token</button>
          <button id="reload" type="button">Reset page</button>
        </div>

        <dl>
          <dt>API endpoint</dt>
          <dd><code>/</code> -> <code>/challenge</code> and <code>/redeem</code></dd>
          <dt>Token</dt>
          <dd id="token">Waiting for solve event...</dd>
          <dt>Validation</dt>
          <dd id="validation">Not validated yet.</dd>
        </dl>

        <pre id="log" aria-live="polite"></pre>
      </section>
    </main>

    <script>
      const widget = document.querySelector("#cap");
      const validateButton = document.querySelector("#validate");
      const reloadButton = document.querySelector("#reload");
      const tokenOutput = document.querySelector("#token");
      const validationOutput = document.querySelector("#validation");
      const logOutput = document.querySelector("#log");

      let token = "";

      function log(message, data) {
        const time = new Date().toLocaleTimeString();
        const details = data === undefined ? "" : ` ${JSON.stringify(data)}`;
        logOutput.textContent += `[${time}] ${message}${details}\n`;
        logOutput.scrollTop = logOutput.scrollHeight;
      }

      widget.addEventListener("progress", (event) => {
        log("progress", event.detail);
      });

      widget.addEventListener("solve", (event) => {
        token = event.detail.token;
        tokenOutput.textContent = token;
        validationOutput.textContent = "Ready to validate.";
        validateButton.disabled = false;
        log("solve", event.detail);
      });

      widget.addEventListener("error", (event) => {
        validationOutput.textContent = "Widget error.";
        log("error", event.detail);
      });

      widget.addEventListener("reset", (event) => {
        token = "";
        tokenOutput.textContent = "Widget reset.";
        validationOutput.textContent = "Not validated yet.";
        validateButton.disabled = true;
        log("reset", event.detail);
      });

      validateButton.addEventListener("click", async () => {
        if (!token) return;

        validateButton.disabled = true;
        validationOutput.textContent = "Validating...";

        const response = await fetch("/validate", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ token }),
        });
        const result = await response.json();

        validationOutput.textContent = `${response.status} ${JSON.stringify(result)}`;
        log("validate", { status: response.status, result });
      });

      reloadButton.addEventListener("click", () => {
        window.location.reload();
      });

      log("ready");
    </script>
  </body>
</html>
